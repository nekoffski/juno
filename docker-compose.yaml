services:
  postgres:
    image: postgres:17-alpine
    env_file:
      - ${ENV_FILE}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./conf/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  juno:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ${ENV_FILE}
    ports:
      - "${JUNO_REST_PORT}:${JUNO_REST_PORT}"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  juno-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file:
      - ${ENV_FILE}
    ports:
      - "${JUNO_WEB_PORT}:${JUNO_WEB_PORT}"
    restart: unless-stopped
    depends_on:
      - juno

volumes:
  postgres_data:
