services:
  lan-agent:
    image: ${JUNO_LAN_AGENT_IMAGE}
    network_mode: host
    env_file:
      - .env
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.3
    command: -config.file=/etc/promtail/promtail.yaml -config.expand-env=true
    environment:
      - LOKI_URL=${LOKI_URL}
    volumes:
      - ./promtail.yaml:/etc/promtail/promtail.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
