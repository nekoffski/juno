{{define "devices.html"}}
<div hx-ext="sse" sse-connect="/sse">
  {{if not .}}
    <div class="empty-state">
      <span class="empty-state__icon">⊙</span>
      <span class="empty-state__text">No devices found</span>
    </div>
  {{else}}
  <div class="devices-grid">
    {{range .}}
      {{template "device_widget.html" .}}
    {{end}}
  </div>
  {{end}}
</div>
{{end}}
